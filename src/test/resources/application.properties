spring.application.name=user-service
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# H2 Database for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT (Required for Tests)
jwt.secret=revshop-secret-key-which-is-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# Config Client Timeout (Avoid Hangups)
spring.cloud.config.request-connect-timeout=5000
spring.cloud.config.request-read-timeout=5000
